  <line x1="600" y1="390" x2="520" y2="440" stroke="#00b4d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="600" y1="390" x2="680" y2="440" stroke="#00b4d8" stroke-width="1.5" opacity="0.4"/>
  <line x1="600" y1="390" x2="600" y2="300" stroke="#00b4d8" stroke-width="1.5" opacity="0.3"/>
