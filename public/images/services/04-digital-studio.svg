<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0b1628"/>
  <rect width="1200" height="800" fill="url(#g4)"/>
  <defs>
    <linearGradient id="g4" x1="1200" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f1d35"/>
    </linearGradient>
  </defs>
  <!-- Browser/app window -->
  <rect x="380" y="270" width="440" height="300" rx="8" stroke="#00b4d8" stroke-width="2" fill="#00b4d8" fill-opacity="0.04" stroke-opacity="0.5"/>
