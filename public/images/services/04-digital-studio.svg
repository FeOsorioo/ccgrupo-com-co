  <rect x="380" y="270" width="440" height="40" rx="8" fill="#00b4d8" fill-opacity="0.08"/>
  <circle cx="408" cy="290" r="6" fill="#00b4d8" opacity="0.4"/>
  <circle cx="428" cy="290" r="6" fill="#00b4d8" opacity="0.3"/>
  <circle cx="448" cy="290" r="6" fill="#00b4d8" opacity="0.2"/>
  <!-- Content mockup lines -->
  <rect x="408" y="330" width="200" height="8" rx="4" fill="#00b4d8" opacity="0.3"/>
  <rect x="408" y="350" width="140" height="6" rx="3" fill="#00b4d8" opacity="0.2"/>
  <rect x="408" y="375" width="180" height="6" rx="3" fill="#00b4d8" opacity="0.15"/>
  <rect x="408" y="391" width="120" height="6" rx="3" fill="#00b4d8" opacity="0.15"/>
  <!-- CTA button mock -->
  <rect x="408" y="415" width="100" height="28" rx="4" stroke="#00b4d8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Right panel -->
  <rect x="640" y="320" width="148" height="220" rx="4" stroke="#00b4d8" stroke-width="1" fill="#00b4d8" fill-opacity="0.06" stroke-opacity="0.3"/>
  <rect x="656" y="340" width="116" height="70" rx="3" fill="#00b4d8" fill-opacity="0.08"/>
  <rect x="656" y="422" width="80" height="6" rx="3" fill="#00b4d8" opacity="0.2"/>
  <rect x="656" y="436" width="60" height="6" rx="3" fill="#00b4d8" opacity="0.15"/>
  <!-- Code brackets -->
  <text x="490" y="560" text-anchor="middle" font-family="monospace" font-size="22" fill="#00b4d8" opacity="0.25">&lt; / &gt;</text>
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="13" fill="#00b4d8" opacity="0.5" letter-spacing="6">DIGITAL STUDIO</text>
